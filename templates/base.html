<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Tracking System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        {% if session['user'] is defined %}
        <nav>
            <a href="{{ url_for('jobs_page') }}">Jobs</a>
            <a href="{{ url_for('candidates_page') }}">Candidates</a>
            <a href="{{ url_for('notifications_page') }}">Notifications</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
        {% endif %}
    </header>

    <div class="flash-messages">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <p class="flash-msg">{{ msg }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <div class="block-content">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 Application Tracking System.</p>
    </footer>
</body>
</html>
